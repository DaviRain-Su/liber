name: CI

# Verifies every push and pull request (typecheck + CLI tests + build) on all
# branches, including main. Deploys are run locally with `npm run deploy` (see
# README), so there is no deploy workflow and no Cloudflare token in CI.
on:
  pull_request:
  push:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
      - run: npm ci
      # Biome lint/format is advisory for now (the codebase predates it). Surfaces
      # findings without failing the build; ratchet to a blocking gate once the
      # one-time format pass + correctness fixes land. See biome.json.
      - name: Biome (advisory)
        run: npm run lint
        continue-on-error: true
      - run: npm test
      - run: npm run build

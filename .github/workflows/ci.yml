name: CI

# Verifies every push and pull request (typecheck + CLI tests + build) on all
# branches, including main. Deploys are run locally with `npm run deploy` (see
# README), so there is no deploy workflow and no Cloudflare token in CI.
on:
  pull_request:
  push:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
      - run: npm ci
      # Biome gate: fails the build on lint ERRORS (formatting + Biome's
      # recommended rule set). The pre-existing JSX a11y / array-index-key /
      # hook-deps backlog is grandfathered to warnings in biome.json (visible but
      # non-blocking) pending a dedicated pass; new error-class issues are blocked.
      - name: Biome
        run: npm run lint
      - run: npm test
      - run: npm run build

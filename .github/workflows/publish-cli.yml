name: Publish liber-cli to npm

# Manual npm release for packages/liber-cli. Runs only via "Run workflow"
# (workflow_dispatch) — never on push. A real publish needs the NPM_TOKEN secret.
#
# Flow:
#   1. Bump packages/liber-cli/package.json version in a commit.
#   2. Run with dry_run = true to verify the package.
#   3. Run again with dry_run = false to publish.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run only (true) or actually publish (false)"
        required: false
        default: "true"
      tag:
        description: "npm dist-tag (latest, next, or beta)"
        required: false
        default: "latest"

concurrency:
  group: npm-publish-liber-cli
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          registry-url: https://registry.npmjs.org
          cache: npm

      - run: npm ci

      - run: npm test

      - run: npm run pack:cli

      - name: Read package metadata
        id: pkg
        shell: bash
        run: |
          {
            echo "name=$(jq -r .name packages/liber-cli/package.json)"
            echo "version=$(jq -r .version packages/liber-cli/package.json)"
          } >> "$GITHUB_OUTPUT"

      - name: Check version is unpublished
        if: ${{ inputs.dry_run != 'true' }}
        shell: bash
        run: |
          if npm view "${{ steps.pkg.outputs.name }}@${{ steps.pkg.outputs.version }}" version >/dev/null 2>&1; then
            echo "${{ steps.pkg.outputs.name }}@${{ steps.pkg.outputs.version }} already exists on npm."
            exit 1
          fi

      - name: Check npm token
        if: ${{ inputs.dry_run != 'true' }}
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "Missing GitHub secret NPM_TOKEN."
            exit 1
          fi

      - name: Publish dry run
        if: ${{ inputs.dry_run == 'true' }}
        run: npm publish --workspace liber-cli --access public --tag "${{ inputs.tag }}" --dry-run

      - name: Publish to npm
        if: ${{ inputs.dry_run != 'true' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --workspace liber-cli --access public --tag "${{ inputs.tag }}"

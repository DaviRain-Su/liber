# Cloudflare Pages + Pages Functions config.
# Frontend = static SPA in dist/; API = Hono in functions/api/[[route]].ts.
name = "liber"
pages_build_output_dir = "dist"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# --- Bindings (create the resources, then fill the ids; see BACKEND.md) ---

[[d1_databases]]
binding = "DB"
database_name = "liber"
database_id = "67796523-5da8-4f69-ba0d-ad5dbaa9ed4d"

[[kv_namespaces]]
binding = "KV"
id = "378c4030ed364bc68af05685fb2ea176"

[[r2_buckets]]
binding = "R2"
bucket_name = "liber-content"

[ai]
binding = "AI"

# NOTE: public AI endpoints are rate-limited per-IP in code via a KV best-effort
# limiter (functions/lib/ratelimit.ts), which throttles sustained abuse loops.
# Cloudflare's atomic Rate Limiting binding is NOT supported in Pages config
# ("unsafe" bindings are rejected), so for hard burst protection enable rate
# limiting on an AI Gateway (set AI_GATEWAY_ID) — the limiter auto-upgrades to
# the AI_RATE_LIMITER binding if a future Pages release exposes one.

# --- Platform ops bindings (semantic search, async jobs, share-card screenshots).
# Resources provisioned 2026-05-31: Vectorize `liber-semantic` (1024/cosine),
# Queue `liber-platform`, and Browser Rendering (Workers Paid). Every use is still
# guarded in code; see /api/platform/status for live binding state. The queue is
# consumed by the standalone worker in wrangler.platform.toml (npm run platform:deploy).
[[vectorize]]
binding = "VECTORIZE"
index_name = "liber-semantic"

[[queues.producers]]
binding = "PLATFORM_QUEUE"
queue = "liber-platform"

[browser]
binding = "BROWSER"

# --- Knowledge graph (living cross-book echoes). See docs/KNOWLEDGE_GRAPH_SPEC.md. ---
# The graph can share the VECTORIZE binding above when dimensions/model match.
# If you split it into a dedicated index/queue later, wire the standalone
# workers/embed-consumer Worker separately.
# [[queues.producers]]
# binding = "EMBED_QUEUE"
# queue = "liber-embed"

# Decentralized-storage endpoints (public, not secrets). Left blank so storage
# falls back to R2 until you opt in. To use the public Walrus testnet, set:
#   WALRUS_PUBLISHER  = "https://publisher.walrus-testnet.walrus.space"
#   WALRUS_AGGREGATOR = "https://aggregator.walrus-testnet.walrus.space"
# Cloudflare Email Sending — transactional email (login OTP codes) to any
# recipient. Private beta (join the waitlist: blog.cloudflare.com/email-service),
# needs a paid Workers plan + a sender domain verified in Email Sending. Once
# granted, uncomment this binding and set EMAIL_FROM in [vars]. Until then,
# /auth/email returns the code in the response (dev mode) — login still works.
# [[send_email]]
# name = "SEND_EMAIL"

[vars]
CHAIN = "sui"
# Sender for login emails — a domain verified in Cloudflare Email Sending.
# EMAIL_FROM = "Liber <login@your-verified-domain.com>"
# Google "Sign in with Google" client id (public; the ID-token aud is checked
# against it). Add your site to the OAuth client's Authorized JavaScript origins.
GOOGLE_CLIENT_ID = "1021328086145-18jc2gqb4rdflor24ein4ub5pgkhi4qn.apps.googleusercontent.com"
WALRUS_PUBLISHER = "https://publisher.walrus-testnet.walrus.space"
WALRUS_AGGREGATOR = "https://aggregator.walrus-testnet.walrus.space"
WALRUS_PUBLISH_TIMEOUT_MS = "800"
ARWEAVE_GATEWAY = "https://arweave.net"
# Sui fullnode for read-only chain verification (latest checkpoint + object lookup).
SUI_RPC = "https://fullnode.testnet.sui.io:443"
# Stablecoin subscription payments are disabled until a treasury address and
# accepted coin type are chosen. Set these as Pages variables/secrets:
# PAYMENT_TREASURY, PAYMENT_COIN_TYPE, PAYMENT_MONTHLY_AMOUNT.
PAYMENT_CHAIN = "sui:testnet"

# Workers AI is enabled through the AI binding above. Create an AI Gateway in
# Cloudflare dashboard when you want analytics/rate limits/cache, then set:
# AI_GATEWAY_ID = "default"
AI_PROVIDER = "workers-ai"
AI_MODEL = "@cf/qwen/qwen3-30b-a3b-fp8"
# Optional override when translation should use a different model:
# AI_TRANSLATION_MODEL = "@cf/qwen/qwen3-30b-a3b-fp8"
AI_GATEWAY_CACHE_TTL = "604800"
SEMANTIC_EMBEDDING_MODEL = "@cf/baai/bge-m3"
PLATFORM_QUEUE_ENABLED = "true"

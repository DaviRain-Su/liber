# Cloudflare Pages + Pages Functions config.
# Frontend = static SPA in dist/; API = Hono in functions/api/[[route]].ts.
name = "liber"
pages_build_output_dir = "dist"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# --- Bindings (create the resources, then fill the ids; see BACKEND.md) ---

[[d1_databases]]
binding = "DB"
database_name = "liber"
database_id = "67796523-5da8-4f69-ba0d-ad5dbaa9ed4d"

[[kv_namespaces]]
binding = "KV"
id = "378c4030ed364bc68af05685fb2ea176"

[[r2_buckets]]
binding = "R2"
bucket_name = "liber-content"

[ai]
binding = "AI"

# --- Knowledge graph (living cross-book echoes). See docs/KNOWLEDGE_GRAPH_SPEC.md. ---
# Inert until GRAPH_ENABLED=true. Create the index + queue first:
#   wrangler vectorize create liber-echoes --dimensions=1024 --metric=cosine
#   wrangler queues create liber-embed && wrangler queues create liber-embed-dlq
# Then uncomment the two bindings below and deploy workers/embed-consumer separately.
# [[vectorize]]
# binding = "VECTORIZE"
# index_name = "liber-echoes"
#
# [[queues.producers]]
# binding = "EMBED_QUEUE"
# queue = "liber-embed"

# Decentralized-storage endpoints (public, not secrets). Left blank so storage
# falls back to R2 until you opt in. To use the public Walrus testnet, set:
#   WALRUS_PUBLISHER  = "https://publisher.walrus-testnet.walrus.space"
#   WALRUS_AGGREGATOR = "https://aggregator.walrus-testnet.walrus.space"
[vars]
CHAIN = "sui"
WALRUS_PUBLISHER = "https://publisher.walrus-testnet.walrus.space"
WALRUS_AGGREGATOR = "https://aggregator.walrus-testnet.walrus.space"
WALRUS_PUBLISH_TIMEOUT_MS = "800"
ARWEAVE_GATEWAY = "https://arweave.net"
# Sui fullnode for read-only chain verification (latest checkpoint + object lookup).
SUI_RPC = "https://fullnode.testnet.sui.io:443"
# Stablecoin subscription payments are disabled until a treasury address and
# accepted coin type are chosen. Set these as Pages variables/secrets:
# PAYMENT_TREASURY, PAYMENT_COIN_TYPE, PAYMENT_MONTHLY_AMOUNT.
PAYMENT_CHAIN = "sui:testnet"
